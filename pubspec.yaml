name: aira_exam
description: "Aplikasi Pengaman Ujian Digital Premium - AIRA HUB Assessment"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  webview_flutter: ^4.10.0
  battery_plus: ^6.2.0
  connectivity_plus: ^6.1.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  flutter_downloader: ^1.11.7
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0   
  onesignal_flutter: ^5.2.4   # Tetap aman untuk notifikasi massal OneSignal

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/ic_launcher.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/ic_launcher.png"
  min_sdk_android: 21